<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gazi Takı</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#f5f5f5;
  --bg2:#ffffff;
  --bg3:#eeeeee;
  --border:#e0e0e0;
  --gold:#b8860b;
  --gold2:#d4a017;
  --white:#1a1a1a;
  --gray:#888;
  --red:#e74c3c;
}

*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

.header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  font-weight:700;
  color:var(--gold);
  letter-spacing:2px;
}
.logo span{ color:var(--white); font-weight:400; }

.cartBtn{
  position:relative;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:8px 14px;
  font-size:13px;
  font-weight:600;
  color:var(--white);
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:border-color .2s;
  font-family:'DM Sans',sans-serif;
}
.cartBtn:hover{ border-color:var(--gold); }
.cartBadge{
  position:absolute;
  top:-6px; right:-6px;
  background:var(--gold);
  color:#fff;
  font-size:10px;
  font-weight:700;
  width:18px; height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.cartBadge.hide{ display:none; }

.cats{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:12px 16px;
  scrollbar-width:none;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.cats::-webkit-scrollbar{ display:none; }
.cat{
  flex-shrink:0;
  padding:7px 16px;
  border-radius:20px;
  border:1px solid var(--border);
  font-size:13px;
  font-weight:500;
  color:var(--gray);
  cursor:pointer;
  transition:all .2s;
  background:var(--bg);
  white-space:nowrap;
  font-family:'DM Sans',sans-serif;
}
.cat:hover{ border-color:var(--gold); color:var(--gold); }
.cat.active{ background:var(--gold); border-color:var(--gold); color:#fff; font-weight:700; }

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:12px;
}

.productCard{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:border-color .2s, transform .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.productCard:active{ transform:scale(.98); }

.productImg{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  background:var(--bg3);
  display:block;
  cursor:pointer;
}

.productInfo{ padding:10px; }
.productName{
  font-size:13px;
  font-weight:500;
  color:var(--white);
  margin-bottom:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.productCat{ font-size:11px; color:var(--gray); margin-bottom:8px; }
.productBottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.productPrice{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  font-weight:700;
  color:var(--gold);
}

.qtyControl{ display:flex; align-items:center; gap:6px; }
.qBtn{
  width:28px; height:28px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--bg3);
  color:var(--white);
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all .15s;
  font-weight:700;
  font-family:'DM Sans',sans-serif;
  flex-shrink:0;
}
.qBtn:hover{ border-color:var(--gold); color:var(--gold); }
.qBtn.active{ background:var(--gold); border-color:var(--gold); color:#fff; }
.qNum{ font-size:14px; font-weight:600; min-width:16px; text-align:center; }

.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  z-index:150;
  backdrop-filter:blur(4px);
}
.overlay.show{ display:block; }

.cartPanel{
  position:fixed;
  bottom:0; left:0; right:0;
  background:var(--bg2);
  border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  padding:16px 16px 30px;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:200;
  max-height:88vh;
  overflow-y:auto;
  box-shadow:0 -4px 20px rgba(0,0,0,.1);
}
.cartPanel.open{ transform:translateY(0); }

.cartHandle{
  width:40px; height:4px;
  background:#ccc;
  border-radius:2px;
  margin:0 auto 16px;
}
.cartTitle{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  font-weight:700;
  margin-bottom:14px;
  color:var(--gold);
}

.cartItem{
  display:flex;
  gap:12px;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.cartItemImg{
  width:52px; height:52px;
  border-radius:10px;
  object-fit:cover;
  background:var(--bg3);
  flex-shrink:0;
}
.cartItemInfo{ flex:1; min-width:0; }
.cartItemName{ font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cartItemSub{ font-size:12px; color:var(--gold); margin-top:2px; }
.cartItemRemove{ color:var(--red); font-size:20px; cursor:pointer; padding:4px 6px; flex-shrink:0; }

.cartEmpty{ text-align:center; padding:30px 0; color:var(--gray); }
.cartEmpty div{ font-size:40px; margin-bottom:8px; }

.cartTotal{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:14px 0;
  padding:14px;
  background:var(--bg3);
  border-radius:12px;
  border:1px solid var(--border);
}
.cartTotalLabel{ font-size:13px; color:var(--gray); }
.cartTotalPrice{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;
  font-weight:700;
  color:var(--gold);
}

.formSection{ margin-bottom:10px; }
.formLabel{
  font-size:11px;
  font-weight:600;
  color:var(--gray);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:5px;
  display:block;
}
.formInput{
  width:100%;
  padding:12px 14px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.formInput:focus{ outline:none; border-color:var(--gold); }
.formInput::placeholder{ color:#aaa; }
.formInput.error{ border-color:var(--red); }

.sendBtn{
  width:100%;
  padding:16px;
  background:var(--gold);
  color:#fff;
  border:none;
  border-radius:14px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.5px;
  transition:all .2s;
  margin-top:6px;
}
.sendBtn:hover{ background:var(--gold2); }
.sendBtn:active{ transform:scale(.98); }
.sendBtn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }

.cartBar{
  position:fixed;
  bottom:0; left:0; right:0;
  background:var(--gold);
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  z-index:140;
  box-shadow:0 -2px 12px rgba(0,0,0,.15);
}
.cartBar.empty{
  background:#ccc;
  pointer-events:none;
}
.cartBarLeft{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  font-size:15px;
  color:#fff;
}
.cartBarCount{
  background:rgba(255,255,255,.3);
  padding:2px 8px;
  border-radius:20px;
  font-size:12px;
}
.cartBarPrice{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;
  font-weight:700;
  color:#fff;
}
.grid{ padding-bottom:80px; }

.thankModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.97);
  z-index:500;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
}
.thankModal.show{ display:flex; }
.thankIcon{ font-size:64px; margin-bottom:16px; animation:pop .4s cubic-bezier(.34,1.56,.64,1); }
.thankTitle{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  font-weight:700;
  color:var(--gold);
  margin-bottom:8px;
}
.thankSub{ font-size:14px; color:var(--gray); line-height:1.6; }
.thankCode{
  margin:20px 0;
  padding:14px 24px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  font-size:13px;
  color:var(--white);
}
.thankCode b{ color:var(--gold); font-size:18px; display:block; margin-top:4px; }
.thankBtn{
  background:var(--gold);
  color:#fff;
  border:none;
  border-radius:14px;
  padding:14px 32px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}

.zoomModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.97);
  z-index:300;
  justify-content:center;
  align-items:center;
  touch-action:none;
}
.zoomModal.show{ display:flex; }
.zoomModal img{
  max-width:95vw;
  max-height:95vh;
  object-fit:contain;
  border-radius:10px;
  transform-origin:center;
}
.zoomClose{
  position:absolute;
  top:14px; right:14px;
  width:38px; height:38px;
  background:white;
  color:#111;
  border:none;
  border-radius:50%;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

@keyframes pop{
  0%{ transform:scale(0); }
  100%{ transform:scale(1); }
}

</style>
</head>
<body>

<div class="header">
  <div class="logo">GAZİ <span>TAKI</span></div>
  <button class="cartBtn" onclick="openCart()">
    🛍 Sepet
    <span class="cartBadge hide" id="cartBadge">0</span>
  </button>
</div>

<div class="cats">
  <div class="cat active" onclick="filterCat('all',this)">Tümü</div>
  <div class="cat" onclick="filterCat('Küpe',this)">Küpe</div>
  <div class="cat" onclick="filterCat('Kolye',this)">Kolye</div>
  <div class="cat" onclick="filterCat('Bileklik',this)">Bileklik</div>
  <div class="cat" onclick="filterCat('Xuping',this)">Xuping</div>
  <div class="cat" onclick="filterCat('CM',this)">CM</div>
  <div class="cat" onclick="filterCat('VIP',this)">VIP</div>
</div>

<div class="grid" id="grid"></div>

<div class="cartBar empty" id="cartBar" onclick="openCart()">
  <div class="cartBarLeft" id="cartBarLeft">
    🛍 Sepetim <span class="cartBarCount" id="cartBarCount">0 ürün</span>
  </div>
  <div class="cartBarPrice" id="cartBarPrice">0₺</div>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cartPanel" id="cartPanel">
  <div class="cartHandle"></div>
  <div class="cartTitle">🛍 Sepetim</div>
  <div id="cartItems"></div>
  <div class="cartTotal">
    <span class="cartTotalLabel">TOPLAM</span>
    <span class="cartTotalPrice" id="cartTotalPrice">0₺</span>
  </div>
  <div class="formSection">
    <label class="formLabel">İsim Soyisim</label>
    <input class="formInput" id="isim" placeholder="Adınızı girin">
  </div>
  <div class="formSection">
    <label class="formLabel">Telefon</label>
    <input class="formInput" id="telefon" placeholder="05xx xxx xx xx" type="tel">
  </div>
  <div class="formSection">
    <label class="formLabel">Adres</label>
    <input class="formInput" id="adres" placeholder="Teslimat adresi">
  </div>
  <button class="sendBtn" id="sendBtn" onclick="sendOrder()">📦 Siparişi Gönder</button>
</div>

<div class="thankModal" id="thankModal">
  <div class="thankIcon">🎉</div>
  <div class="thankTitle">Siparişiniz Alındı!</div>
  <div class="thankSub">WhatsApp üzerinden onay mesajı gönderilecek.</div>
  <div class="thankCode">
    Sipariş Kodunuz
    <b id="thankCode">—</b>
  </div>
  <button class="thankBtn" onclick="closeThank()">🛍 Alışverişe Devam Et</button>
</div>

<div class="zoomModal" id="zoomModal" onclick="closeZoom()">
  <button class="zoomClose" onclick="closeZoom()">×</button>
  <img id="zoomImg" onclick="event.stopPropagation()">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBK4mibwFjSlrL7k-omOPn7oDZQVExYgJE",
  authDomain: "gazi-taki.firebaseapp.com",
  databaseURL: "https://gazi-taki-default-rtdb.firebaseio.com",
  projectId: "gazi-taki",
  storageBucket: "gazi-taki.firebasestorage.app",
  messagingSenderId: "17296440633",
  appId: "1:17296440633:web:2e5d897bc212a0ffa97ce8"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let products  = [];
let activeCat = "all";
let cart      = {};
let sending   = false;

function img(url){
  if(!url||url.trim()==="") return "https://via.placeholder.com/300";
  if(url.includes("drive.google.com")){
    let m=url.match(/[-\w]{25,}/);
    if(m&&m[0]) return "https://drive.google.com/thumbnail?id="+m[0]+"&sz=w800";
  }
  if(url.startsWith("http://")||url.startsWith("https://")) return url;
  return "https://via.placeholder.com/300";
}

async function loadData(){
  try{
    const snapshot = await get(ref(db, "products"));
    const val = snapshot.val();
    if(val){
      // Firebase obje olarak döner, diziye çevir
      products = Array.isArray(val) ? val : Object.values(val);
    } else {
      products = [];
    }
    renderGrid();
  }catch(e){ console.error("Veri yüklenemedi:", e); }
}

async function saveOrder(order){
  await push(ref(db, "orders"), order);
}

function filterCat(cat,el){
  activeCat=cat;
  document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  renderGrid();
}

function renderGrid(){
  const filtered=products.filter(p=>activeCat==="all"||p.category===activeCat);
  if(!filtered.length){
    document.getElementById("grid").innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray)">Bu kategoride ürün yok</div>`;
    return;
  }
  document.getElementById("grid").innerHTML=filtered.map(p=>{
    const id=p.id||p.ad;
    const qty=cart[id]?cart[id].qty:0;
    return `<div class="productCard">
      <img class="productImg" src="${img(p.resim)}" onclick="openZoom('${img(p.resim)}')">
      <div class="productInfo">
        <div class="productName">${p.ad}</div>
        <div class="productCat">${p.category}</div>
        <div class="productBottom">
          <div class="productPrice">${p.fiyat}₺</div>
          <div class="qtyControl">
            <div class="qBtn ${qty>0?'active':''}" onclick="minus('${id}')">−</div>
            <div class="qNum" id="qnum-${id}">${qty}</div>
            <div class="qBtn active" onclick="plus('${id}','${p.ad}',${p.fiyat},'${p.resim||''}','${p.category}')">+</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

window.plus = function(id,ad,fiyat,resim,category){
  if(!cart[id]) cart[id]={id,ad,fiyat,resim,category,qty:0};
  cart[id].qty++;
  updateCartUI();
  renderGrid();
}

window.minus = function(id){
  if(!cart[id]) return;
  cart[id].qty--;
  if(cart[id].qty<=0) delete cart[id];
  updateCartUI();
  renderGrid();
}

window.removeItem = function(id){
  delete cart[id];
  updateCartUI();
  renderGrid();
  renderCartItems();
}

function cartCount(){
  return Object.values(cart).reduce((s,i)=>s+i.qty,0);
}
function cartTotal(){
  return Object.values(cart).reduce((s,i)=>s+(i.qty*i.fiyat),0);
}

function updateCartUI(){
  const count=cartCount();
  const total=cartTotal();

  const badge=document.getElementById("cartBadge");
  badge.innerText=count;
  badge.classList.toggle("hide",count===0);
  document.getElementById("cartTotalPrice").innerText=total+"₺";

  const bar=document.getElementById("cartBar");
  document.getElementById("cartBarCount").innerText=count+" ürün";
  document.getElementById("cartBarPrice").innerText=total+"₺";

  if(count===0){ bar.classList.add("empty"); }
  else { bar.classList.remove("empty"); }
}

function renderCartItems(){
  const items=Object.values(cart);
  const el=document.getElementById("cartItems");
  if(!items.length){
    el.innerHTML=`<div class="cartEmpty"><div>🛒</div>Sepetiniz boş</div>`;
    return;
  }
  el.innerHTML=items.map(it=>`
    <div class="cartItem">
      <img class="cartItemImg" src="${img(it.resim)}">
      <div class="cartItemInfo">
        <div class="cartItemName">${it.ad}</div>
        <div class="cartItemSub">${it.qty} adet × ${it.fiyat}₺ = ${it.qty*it.fiyat}₺</div>
      </div>
      <div class="cartItemRemove" onclick="removeItem('${it.id}')">×</div>
    </div>`).join("");
}

window.openCart = function(){
  renderCartItems();
  updateCartUI();
  document.getElementById("cartPanel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}

window.closeCart = function(){
  document.getElementById("cartPanel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

window.sendOrder = async function(){
  if(sending) return;
  const items=Object.values(cart);
  if(!items.length){ alert("Sepetiniz boş!"); return; }

  const isim=document.getElementById("isim").value.trim();
  const telefon=document.getElementById("telefon").value.trim();
  const adres=document.getElementById("adres").value.trim();

  let valid=true;
  [["isim",isim],["telefon",telefon],["adres",adres]].forEach(([id,val])=>{
    const el=document.getElementById(id);
    if(!val){ el.classList.add("error"); valid=false; }
    else el.classList.remove("error");
  });
  if(!valid){ alert("Lütfen tüm alanları doldurun!"); return; }

  const telClean=telefon.replace(/\D/g,"");
  if(telClean.length<10){
    document.getElementById("telefon").classList.add("error");
    alert("Geçerli bir telefon numarası girin!");
    return;
  }

  sending=true;
  const btn=document.getElementById("sendBtn");
  btn.disabled=true;
  btn.innerText="Gönderiliyor...";

  const orderId="ORD-"+Date.now().toString().slice(-5);
  const order={
    id: orderId,
    date: new Date().toISOString(),
    status: "yeni",
    customer: {isim, telefon, adres},
    items
  };

  try{
    await saveOrder(order);
  }catch(e){
    console.error("Sipariş kaydedilemedi:", e);
    alert("Bir hata oluştu, tekrar deneyin.");
    sending=false;
    btn.disabled=false;
    btn.innerText="📦 Siparişi Gönder";
    return;
  }

  let msg=`🧾 SİPARİŞ NO: ${orderId}\n\n👤 ${isim}\n📞 ${telefon}\n📍 ${adres}\n\n`;
  let totalPrice=0;
  items.forEach(p=>{
    totalPrice+=p.qty*p.fiyat;
    msg+=`• ${p.ad} - ${p.qty} adet - ${p.qty*p.fiyat}₺\n`;
  });
  msg+=`\n💰 TOPLAM: ${totalPrice}₺`;

  document.getElementById("thankCode").innerText=orderId;
  document.getElementById("thankModal").classList.add("show");
  closeCart();

  setTimeout(()=>{
    window.location.href="https://wa.me/905469029730?text="+encodeURIComponent(msg);
  },1500);

  cart={};
  sending=false;
  btn.disabled=false;
  btn.innerText="📦 Siparişi Gönder";
  document.getElementById("isim").value="";
  document.getElementById("telefon").value="";
  document.getElementById("adres").value="";
  renderGrid();
  updateCartUI();
}

window.closeThank = function(){
  document.getElementById("thankModal").classList.remove("show");
}

let zScale=1, zStartDist=0, zLastScale=1;

window.openZoom = function(src){
  const el=document.getElementById("zoomImg");
  el.src=src;
  zScale=1; el.style.transform="scale(1)";
  document.getElementById("zoomModal").classList.add("show");
  document.body.style.overflow="hidden";
}

window.closeZoom = function(){
  document.getElementById("zoomModal").classList.remove("show");
  document.body.style.overflow="";
  zScale=1;
  document.getElementById("zoomImg").style.transform="scale(1)";
}

function getDist(t){
  let dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

document.addEventListener("DOMContentLoaded",()=>{
  const el=document.getElementById("zoomImg");
  el.addEventListener("touchstart",(e)=>{
    if(e.touches.length===2){ zStartDist=getDist(e.touches); zLastScale=zScale; }
  });
  el.addEventListener("touchmove",(e)=>{
    if(e.touches.length===2){
      e.preventDefault();
      const nd=getDist(e.touches);
      zScale=Math.max(1,Math.min(zLastScale*(nd/zStartDist),8));
      el.style.transform=`scale(${zScale})`;
    }
  });
});

loadData();
setInterval(loadData, 30000);
  
</script>
</body>
</html>
