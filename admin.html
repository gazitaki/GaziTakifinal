<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gazi Takı Admin Panel</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<!-- PDF Oluşturucu Kütüphane -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{ font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background:#111; color:white; margin:0; padding:12px; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
.card{ background:#222; padding:12px; margin-bottom:12px; border-radius:12px; box-sizing:border-box; border:1px solid #333; }
input,select,button{ width:100%; padding:11px; margin-top:6px; border:none; border-radius:8px; box-sizing:border-box; font-size:14px; background:#2a2a2a; color:white; }
input:focus, select:focus{ outline:1px solid #00b894; }
button{ cursor:pointer; font-weight:bold; }
.primary{ background:#00b894; color:white; }
.primary:active{ transform:scale(0.98); }
.deleteBtn{ background:#d63031; color:white; margin-top:5px; }
.passiveBtn{ background:#e17055; color:white; margin-top:5px; }
.iptalBtn{ background:#636e72; color:white; margin-top:8px; padding:10px; border-radius:8px; font-weight:bold; width:100%; border:none; cursor:pointer; font-size:14px; }

.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:15px; }
.statBox{ background:#1c1c1c; padding:12px 4px; border-radius:12px; text-align:center; font-size:11px; font-weight:bold; position:relative; border:1px solid #222; }
.statBox b{ display:block; font-size:15px; margin-top:5px; color:#00d084; }

.filterIcon{ position:absolute; top:4px; right:4px; background:#333; border:none; color:white; width:20px; height:20px; border-radius:4px; cursor:pointer; font-size:10px; display:flex; align-items:center; justify-content:center; }
.filterPanel{ display:none; position:absolute; top:30px; right:0; background:#222; border:1px solid #333; border-radius:10px; overflow:hidden; z-index:100; min-width:120px; box-shadow:0 4px 15px rgba(0,0,0,.5); }
.filterPanel.show{ display:block; }
.filterOption{ padding:8px 12px; font-size:12px; font-weight:bold; cursor:pointer; border-bottom:1px solid #333; text-align:left; }
.filterOption:last-child{ border-bottom:none; }
.filterOption:hover{ background:#2a2a2a; }
.filterOption.active{ color:#00d084; }
.filterLabel{ font-size:9px; color:#888; margin-top:2px; display:block; }

#products{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.productImage{ width:100%; height:130px; object-fit:cover; border-radius:10px; background:#333; cursor:pointer; display:block; }
.productImage.pasif-img{ opacity:0.4; filter:grayscale(100%); }

.orderItem{ display:flex; gap:10px; align-items:center; background:#1a1a1a; padding:8px; border-radius:10px; margin-top:6px; }
.orderItem img{ width:60px; height:60px; object-fit:cover; border-radius:8px; background:#333; cursor:pointer; flex-shrink:0; }

.nextBtn{ margin-top:8px; padding:10px; border-radius:8px; font-weight:bold; border:none; cursor:pointer; width:100%; font-size:13px; }
.nextBtn-yeni{ background:linear-gradient(90deg,#f39c12,#e67e22); color:white; }
.nextBtn-odeme{ background:linear-gradient(90deg,#2980b9,#3498db); color:white; }
.pdfBtn{ background:linear-gradient(90deg,#6c5ce7,#a29bfe); color:white; margin-top:8px; padding:10px; border-radius:8px; font-weight:bold; width:100%; border:none; cursor:pointer; font-size:13px; }
.waBtn{ background:#25d366; color:white; margin-top:8px; display:block; text-align:center; text-decoration:none; padding:10px; border-radius:8px; font-weight:bold; font-size:13px; box-sizing:border-box; }

.bolumBaslik{ background:#1c1c1c; padding:12px; border-radius:10px; margin-bottom:6px; font-size:14px; font-weight:bold; border-left:4px solid #00b894; cursor:pointer; display:flex; align-items:center; justify-content:space-between; user-select:none; }
.bolumIcerik{ display:none; margin-bottom:10px; }
.bolumIcerik.show{ display:block; }
.countBadge{ background:#333; padding:2px 8px; border-radius:20px; font-size:11px; margin-left:8px; }

.arsivRow{ display:flex; justify-content:space-between; align-items:center; padding:10px; background:#1a1a1a; border-radius:10px; margin-bottom:6px; font-size:13px; }
.arsivRow .detail{ color:#aaa; font-size:11px; margin-top:2px; }
.arsivRow .tutar{ color:#00d084; font-weight:bold; font-size:14px; }

#loginPage{ max-width:400px; margin:60px auto; padding:20px; }
#adminContent{ display:none; }

.catManagerGrid { display: grid; grid-template-columns: 1fr auto; gap: 6px; margin-top: 6px; align-items: center; background: #1a1a1a; padding: 6px 10px; border-radius: 8px; }
.catManagerGrid span { font-size: 13px; font-weight: bold; }
.catMiniDel { background: #d63031; color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; width: auto; margin: 0; cursor: pointer; }

/* ZOOM */
.zoomModal{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:999; justify-content:center; align-items:center; }
.zoomModal.show{ display:flex; }
.zoomModal img{ max-width:95vw; max-height:95vh; object-fit:contain; border-radius:10px; }
.zoomClose{ position:absolute; top:14px; right:14px; width:38px; height:38px; background:white; color:#111; border:none; border-radius:50%; font-size:22px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:1000; }
</style>
</head>
<body>

<div class="zoomModal" id="zoomModal" onclick="closeZoom()">
  <button class="zoomClose" onclick="closeZoom()">×</button>
  <img id="zoomImg" onclick="event.stopPropagation()">
</div>

<div id="loginPage" class="card">
  <h2 style="text-align:center;color:#00b894;margin-top:0;">🔐 Gazi Takı Giriş</h2>
  <input id="loginEmail" type="email" placeholder="E-posta adresiniz" style="background:#2a2a2a">
  <input id="loginPassword" type="password" placeholder="Şifreniz" style="background:#2a2a2a">
  <button class="primary" style="margin-top:15px;" onclick="loginAdmin()">GİRİŞ YAP</button>
  <p id="loginError" style="color:#d63031;font-size:13px;font-weight:bold;text-align:center;margin-top:10px;"></p>
</div>

<div id="adminContent">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <h2 style="margin:0;font-size:20px;">🧑‍💼 Admin Panel</h2>
    <button onclick="logoutAdmin()" style="width:auto;background:#333;padding:6px 12px;font-size:12px;margin:0;">🚪 Çıkış</button>
  </div>

  <div class="stats">
    <div class="statBox">📦 Sipariş<b id="totalOrders">0</b></div>
    <div class="statBox">🛒 Ürün<b id="totalProducts">0</b></div>
    <div class="statBox">
      💰 Kazanç<b id="totalMoney">0₺</b>
      <span class="filterLabel" id="filterLabel">Bu Hafta</span>
      <button class="filterIcon" onclick="toggleFilter(event)">☰</button>
      <div class="filterPanel" id="filterPanel">
        <div class="filterOption active" onclick="setFilter('hafta','Bu Hafta',this)">Bu Hafta</div>
        <div class="filterOption" onclick="setFilter('ay','Bu Ay',this)">Bu Ay</div>
        <div class="filterOption" onclick="setFilter('yillik','Bu Yıl',this)">Bu Yıl</div>
        <div class="filterOption" onclick="setFilter('hepsi','Tüm Zamanlar',this)">Tüm Zamanlar</div>
      </div>
    </div>
  </div>

  <div class="card" style="padding:4px;margin-bottom:12px;">
    <input id="searchOrder" placeholder="👤 Müşteri adı veya 📞 tel no ile ara..." oninput="render()" style="background:#2a2a2a;margin:0;">
  </div>

  <div class="bolumBaslik" style="border-left-color:#e17055" onclick="goBolum('yeni')">🟠 Yeni Siparişler <span class="countBadge" id="count-yeni">0</span></div>
  <div class="bolumIcerik show" id="body-yeni"></div>

  <div class="bolumBaslik" style="border-left-color:#0984e3" onclick="goBolum('odeme')">🟡 Ödeme Bekleyen <span class="countBadge" id="count-odeme">0</span></div>
  <div class="bolumIcerik" id="body-odeme"></div>

  <div class="bolumBaslik" style="border-left-color:#6c5ce7" onclick="goBolum('kargo')">🟣 Kargoda <span class="countBadge" id="count-kargo">0</span></div>
  <div class="bolumIcerik" id="body-kargo"></div>

  <div class="bolumBaslik" style="border-left-color:#d63031" onclick="goBolum('iptal')">❌ İptal Edilenler <span class="countBadge" id="count-iptal">0</span></div>
  <div class="bolumIcerik" id="body-iptal"></div>

  <div class="bolumBaslik" style="border-left-color:#00b894" onclick="goBolum('arsiv')">📁 Arşiv <span class="countBadge" id="count-arsiv">0</span></div>
  <div class="bolumIcerik" id="body-arsiv"></div>

  <div class="bolumBaslik" style="border-left-color:#6c5ce7" onclick="goBolum('kategoriYonetim')">🛠 Kategorileri Yönet <span class="countBadge" id="count-kategoriList">0</span></div>
  <div class="bolumIcerik" id="body-kategoriYonetim">
    <div class="card">
      <h3>📁 Yeni Kategori Ekle</h3>
      <input id="yeniKategoriAd" placeholder="Kategori adı (Örn: Şahmeran)">
      <button class="primary" onclick="addCategory()">➕ KATEGORİ EKLE</button>
      <div id="adminCategoryList" style="margin-top:12px;"></div>
    </div>
  </div>

  <div class="card">
    <h3>📦 Ürün Ekle</h3>
    <input id="ad" placeholder="Ürün adı">
    <input id="fiyat" type="number" placeholder="Fiyat">
    <input id="resim" placeholder="Resim link">
    <select id="kategori"><option value="">Kategoriler Yükleniyor...</option></select>
    <button class="primary" onclick="addProduct()">➕ EKLE</button>
  </div>

  <div class="bolumBaslik" style="border-left-color:#0984e3" onclick="goBolum('urunler')">📦 Ürün Listesi <span class="countBadge" id="count-urunler">0</span></div>
  <div class="bolumIcerik" id="body-urunler">
    <div id="products"></div>
  </div>
</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBK4mibwFjSlrL7k-omOPn7oDZQVExYgJE",
  authDomain: "gazi-taki.firebaseapp.com",
  projectId: "gazi-taki",
  storageBucket: "gazi-taki.firebasestorage.app",
  messagingSenderId: "17296440633",
  appId: "1:17296440633:web:aa3a2acc23cdafe1a97ce8"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let products = [];
let allOrders = [];
let categories = [];
let activeFilter = "hafta";

const orderMap = {};
const productMap = {};

const DEFAULT_IMG = "https://via.placeholder.com/300?text=Gazi+Taki";

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("adminContent").style.display = "block";
    startListeners();
  } else {
    document.getElementById("loginPage").style.display = "block";
    document.getElementById("adminContent").style.display = "none";
  }
});

function loginAdmin(){
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPassword").value;
  const err = document.getElementById("loginError");
  err.innerText = "";
  auth.signInWithEmailAndPassword(email, pass).catch(e => { err.innerText = "Hatalı giriş: " + e.message; });
}

function logoutAdmin(){ auth.signOut(); }

function startListeners(){
  db.collection("categories").orderBy("name", "asc").onSnapshot(snap => {
    categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateCategorySelects();
    render();
  });

  db.collection("products").onSnapshot(snap => {
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    products.forEach(p => { productMap[p.id] = p; });
    render();
  });

  db.collection("orders").orderBy("date","desc").onSnapshot(snap => {
    allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allOrders.forEach(o => { orderMap[o.id] = o; });
    render();
  });
}

function updateCategorySelects() {
  const select = document.getElementById("kategori");
  if (!select) return;
  if (categories.length === 0) {
    select.innerHTML = '<option value="">Önce Kategori Ekleyin</option>';
    return;
  }
  select.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join("");
}

function addCategory() {
  const input = document.getElementById("yeniKategoriAd");
  const nameV = input.value.trim();
  if (!nameV) { alert("Lütfen bir kategori adı girin!"); return; }
  db.collection("categories").add({ name: nameV }).then(() => { input.value = ""; }).catch(e => alert("Hata: " + e.message));
}

function deleteCategory(id) {
  if (confirm("Bu kategoriyi silmek istediğinize emin misiniz?")) {
    db.collection("categories").doc(id).delete().catch(e => alert("Hata: " + e.message));
  }
}

function openZoom(src){
  document.getElementById("zoomImg").src = src || DEFAULT_IMG;
  document.getElementById("zoomModal").classList.add("show");
  document.body.style.overflow = "hidden";
}
function closeZoom(){
  document.getElementById("zoomModal").classList.remove("show");
  document.body.style.overflow = "";
}

function getRange(f){
  const now = new Date();
  if(f==="hafta"){
    const day=now.getDay(), diff=(day===0)?6:day-1;
    const s=new Date(now); s.setHours(0,0,0,0); s.setDate(now.getDate()-diff);
    const e=new Date(s); e.setDate(s.getDate()+7);
    return {start:s,end:e};
  }
  if(f==="ay") return {start:new Date(now.getFullYear(),now.getMonth(),1),end:new Date(now.getFullYear(),now.getMonth()+1,1)};
  if(f==="yillik") return {start:new Date(now.getFullYear(),0,1),end:new Date(now.getFullYear()+1,0,1)};
  return null;
}

function calcMoney(){
  const range=getRange(activeFilter);
  let t=0;
  allOrders.forEach(o=>{
    if(o.status==="iptal") return;
    if(range && o.date){ const d=new Date(o.date); if(d<range.start||d>=range.end) return; }
    o.items?.forEach(it=>{ t+=(it.qty||0)*(it.fiyat||0); });
  });
  return t;
}

function toggleFilter(e){
  e.stopPropagation();
  document.getElementById("filterPanel").classList.toggle("show");
}

function setFilter(key,label,el){
  activeFilter=key;
  document.getElementById("filterLabel").innerText=label;
  document.querySelectorAll(".filterOption").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("totalMoney").innerText=calcMoney()+"₺";
}
document.addEventListener("click",()=>{ document.getElementById("filterPanel")?.classList.remove("show"); });

function goBolum(key){
  ["yeni","odeme","kargo","iptal","arsiv","urunler","kategoriYonetim"].forEach(k=>{
    const el = document.getElementById("body-"+k);
    if(el) el.classList.toggle("show",k===key);
  });
}

function calcTotal(order){
  let t=0;
  order.items?.forEach(it=>{ t+=(it.qty||0)*(it.fiyat||0); });
  return t;
}

function waLink(tel,msg){
  let n = tel.replace(/\D/g,"");
  if(n.startsWith("0")) n = n.substring(1);
  if(!n.startsWith("90")) n = "90" + n;
  return "https://wa.me/"+n+"?text="+encodeURIComponent(msg);
}

function addProduct(){
  const adV=document.getElementById("ad").value.trim();
  const fiyatV=document.getElementById("fiyat").value.trim();
  const resimV=document.getElementById("resim").value.trim();
  const katV=document.getElementById("kategori").value;
  if(!adV||!fiyatV||!katV){ alert("Ad, Fiyat ve Kategori seçimi zorunludur!"); return; }
  db.collection("products").add({ ad:adV, fiyat:parseFloat(fiyatV), resim:resimV, category:katV, aktif:true });
  document.getElementById("ad").value="";
  document.getElementById("fiyat").value="";
  document.getElementById("resim").value="";
}

function toggleProductStatus(idx){
  const p = products[idx];
  if(!p) return;
  db.collection("products").doc(p.id).update({ aktif: !(p.aktif !== false) });
}

function deleteProduct(idx){
  const p = products[idx];
  if(!p) return;
  if(confirm("Bu ürünü silmek istediğinize emin misiniz?")) db.collection("products").doc(p.id).delete();
}

function nextStatus(idx){
  const o = allOrders[idx];
  if(!o) return;
  const map = { yeni:"odeme", odeme:"kargo", kargo:"arsiv" };
  const newStatus = map[o.status||"yeni"];
  if(!newStatus) return;
  const update = { status: newStatus };
  if(newStatus==="arsiv") update.arsivTarihi = new Date().toLocaleDateString("tr-TR");
  db.collection("orders").doc(o.id).update(update);
}

function iptalEt(idx){
  const o = allOrders[idx];
  if(!o) return;
  if(confirm("Sipariş iptal edilsin mi?")){
    db.collection("orders").doc(o.id).update({ status:"iptal", iptalTarihi:new Date().toLocaleDateString("tr-TR") });
  }
}

// Akıllı Görsel PDF Oluşturucu Fonksiyonu
function generateOrderPDF(idx) {
  const o = allOrders[idx];
  if (!o) return;
  
  const total = calcTotal(o);
  const printDefaultImg = "https://via.placeholder.com/150?text=Gazi+Taki";
  
  // PDF için sanal bir konteyner oluşturuyoruz (Ekranda çirkinlik yaratmaz)
  const element = document.createElement('div');
  element.style.padding = '20px';
  element.style.background = '#ffffff';
  element.style.color = '#111111';
  element.style.fontFamily = 'Arial, sans-serif';
  
  let html = `
    <div style="max-width: 600px; margin: 0 auto; border: 2px solid #333; border-radius: 12px; padding: 20px; background: #fff;">
      <div style="text-align: center; margin-bottom: 20px; border-bottom: 3px double #333; padding-bottom: 12px;">
        <h2 style="margin: 0; font-size: 26px; font-weight: 900; color: #000; letter-spacing: 1px;">GAZİ TAKI</h2>
        <p style="margin: 5px 0 0 0; font-size: 13px; color: #444; font-weight: bold; text-transform: uppercase;">📋 SİPARİŞ HAZIRLAMA VE PAKETLEME FİŞİ</p>
      </div>
      
      <table style="width: 100%; margin-bottom: 20px; border-collapse: collapse; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; overflow: hidden;">
        <tr><td style="padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; color: #555; width: 110px; font-size: 11px; text-transform: uppercase;">Sipariş ID:</td><td style="padding: 10px; border-bottom: 1px solid #eee; font-family: monospace; font-weight: bold;">${o.id || ""}</td></tr>
        <tr><td style="padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; color: #555; font-size: 11px; text-transform: uppercase;">Müşteri:</td><td style="padding: 10px; border-bottom: 1px solid #eee; font-size: 15px; font-weight: bold;">${o.customer?.isim || ""}</td></tr>
        <tr><td style="padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; color: #555; font-size: 11px; text-transform: uppercase;">Telefon:</td><td style="padding: 10px; border-bottom: 1px solid #eee; font-weight: bold;">${o.customer?.telefon || ""}</td></tr>
        <tr><td style="padding: 10px; font-weight: bold; color: #555; font-size: 11px; text-transform: uppercase;">Kargo Adresi:</td><td style="padding: 10px; white-space: pre-wrap; font-weight: 500; line-height: 1.4;">${o.customer?.adres || ""}</td></tr>
      </table>
      
      <div style="font-weight: 800; font-size: 15px; margin-bottom: 10px; color: #000; text-transform: uppercase; border-left: 4px solid #111; padding-left: 8px;">Hazırlanacak Ürünler</div>
      <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
        <thead>
          <tr style="border-bottom: 2px solid #111;">
            <th style="text-align: left; font-size: 11px; color: #444; padding: 8px 5px; text-transform: uppercase; width: 90px;">Görsel</th>
            <th style="text-align: left; font-size: 11px; color: #444; padding: 8px 5px; text-transform: uppercase;">Ürün Bilgisi</th>
            <th style="text-align: center; font-size: 11px; color: #444; padding: 8px 5px; text-transform: uppercase; width: 80px;">Adet</th>
            <th style="text-align: right; font-size: 11px; color: #444; padding: 8px 5px; text-transform: uppercase; width: 90px;">Fiyat</th>
          </tr>
        </thead>
        <tbody>`;
        
        o.items?.forEach(it => {
          const src = it.resim || printDefaultImg;
          html += `
            <tr style="border-bottom: 1px solid #ddd;">
              <td style="padding: 10px 5px;"><img src="${src}" style="width: 75px; height: 75px; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; display: block;" onerror="this.src='${printDefaultImg}'"></td>
              <td style="padding: 10px 5px; vertical-align: middle;"><span style="font-weight: bold; font-size: 14px; color: #000;">${it.ad}</span></td>
              <td style="padding: 10px 5px; vertical-align: middle; text-align: center;"><span style="font-size: 16px; font-weight: 900; color: #000; background: #e0e0e0; padding: 4px 10px; border-radius: 6px; border: 1px solid #bbb; display: inline-block;">${it.qty}</span></td>
              <td style="padding: 10px 5px; vertical-align: middle; text-align: right; font-weight: bold;">${it.fiyat} ₺</td>
            </tr>`;
        });
        
  html += `
        </tbody>
      </table>
      
      <div style="text-align: right; margin-top: 15px; padding-top: 12px; border-top: 3px solid #111; font-size: 18px; font-weight: 900; color: #000;">TOPLAM TUTAR: ${total} ₺</div>
      <div style="text-align: center; margin-top: 25px; font-size: 11px; color: #666; font-weight: bold; border-top: 1px dashed #ccc; padding-top: 10px;">⚠️ Lütfen paketlemeden önce ürün görsellerini ve adetleri elinizdeki ürünle son kez eşleştiriniz!</div>
    </div>`;
    
  element.innerHTML = html;

  // html2pdf Ayarları
  const opt = {
    margin:       [10, 10, 10, 10],
    filename:     `GaziTaki-Siparis-${o.customer?.isim?.replace(/\s+/g, '_') || o.id}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, logging: false },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  // PDF üretme ve indirme tetikleyici
  html2pdf().set(opt).from(element).save();
}

function buildCard(order, idx){
  const total=calcTotal(order);
  const status=order.status||"yeni";
  const tel=order.customer?.telefon||"";
  const isim=order.customer?.isim||"";

  let html=`<div class="card">
    <b style="font-size:11px;color:#aaa">${order.id||""}</b><br>
    👤 ${isim} | 📞 ${tel}<br>📍 ${order.customer?.adres||""}
    <hr>`;

  order.items?.forEach(it=>{
    const src=it.resim||DEFAULT_IMG;
    html+=`<div class="orderItem">
      <img src="${src}" onerror="this.src='${DEFAULT_IMG}'" onclick="openZoom('${src.replace(/'/g,"\\'")}')">
      <div><b>${it.ad}</b><br>${it.qty} adet x ${it.fiyat}₺</div>
    </div>`;
  });

  const waOdeme=waLink(tel,`Merhaba ${isim}, Gazi Takı siparişiniz hazırlandı 🛍️\nÖdeme bekliyoruz.\nToplam: ${total}₺`);
  const waKargo=waLink(tel,`Merhaba ${isim}, Gazi Takı siparişiniz kargoya verildi! 📦`);

  let nextBtn="", waBtn="";
  if(status==="yeni"){
    nextBtn=`<button class="nextBtn nextBtn-yeni" onclick="nextStatus(${idx})">🟡 Ödeme Bekleyene Taşı →</button>`;
  }
  if(status==="odeme"){
    nextBtn=`<button class="nextBtn nextBtn-odeme" onclick="nextStatus(${idx})">🟣 Kargoya Ver →</button>`;
    waBtn=`<a class="waBtn" href="${waOdeme}" target="_blank">💬 WhatsApp - Ödeme İste</a>`;
  }
  if(status==="kargo"){
    nextBtn=`<button class="nextBtn primary" onclick="nextStatus(${idx})">📁 Arşive Gönder</button>`;
    waBtn=`<a class="waBtn" href="${waKargo}" target="_blank">💬 WhatsApp - Kargo Bilgisi</a>`;
  }

  html+=`<hr><b>💰 TOPLAM: ${total}₺</b>
    ${nextBtn}${waBtn}
    <button class="pdfBtn" onclick="generateOrderPDF(${idx})">📄 PDF Olarak İndir / Paylaş</button>
    <button class="iptalBtn" onclick="iptalEt(${idx})">❌ İptal Et</button>
  </div>`;
  return html;
}

function render(){
  document.getElementById("totalProducts").innerText=products.length;
  document.getElementById("count-urunler").innerText=products.length;
  document.getElementById("count-kategoriList").innerText=categories.length;
  document.getElementById("totalMoney").innerText=calcMoney()+"₺";

  const key=document.getElementById("searchOrder").value.toLowerCase();

  let catHtml = "";
  categories.forEach(c => {
    catHtml += `<div class="catManagerGrid">
      <span>📁 ${c.name}</span>
      <button class="catMiniDel" onclick="deleteCategory('${c.id}')">🗑 Sil</button>
    </div>`;
  });
  document.getElementById("adminCategoryList").innerHTML = catHtml || "<p style='color:#666;font-size:12px;'>Kategori bulunamadı.</p>";

  let p="";
  products.forEach((x,i)=>{
    const isAktif=x.aktif!==false;
    const src=x.resim||DEFAULT_IMG;
    p+=`<div class="card" style="padding:8px;">
      <img class="productImage ${isAktif?'':'pasif-img'}" src="${src}" onerror="this.src='${DEFAULT_IMG}'" onclick="openZoom('${src.replace(/'/g,"\\'")}')">
      <div style="margin-top:5px;font-weight:bold;font-size:12px;">${x.ad}</div>
      <div style="color:#aaa;font-size:11px;margin-bottom:2px;">📁 ${x.category||'Kategorisiz'}</div>
      <div style="color:#00d084;font-weight:bold;">${x.fiyat}₺</div>
      <button class="${isAktif?'primary':'passiveBtn'}" onclick="toggleProductStatus(${i})">${isAktif?'🟢 Aktif':'🔴 Pasif'}</button>
      <button class="deleteBtn" onclick="deleteProduct(${i})">🗑 Sil</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=p;

  const yeniList=allOrders.map((o,i)=>({o,i})).filter(({o})=>(o.status||"yeni")==="yeni");
  const odemeList=allOrders.map((o,i)=>({o,i})).filter(({o})=>o.status==="odeme");
  const kargoList=allOrders.map((o,i)=>({o,i})).filter(({o})=>o.status==="kargo");
  const iptalList=allOrders.map((o,i)=>({o,i})).filter(({o})=>o.status==="iptal");
  const arsivList=allOrders.map((o,i)=>({o,i})).filter(({o})=>o.status==="arsiv");

  const applySearch=list=>list.filter(({o})=>(o.customer?.isim||"").toLowerCase().includes(key)||(o.customer?.telefon||"").toLowerCase().includes(key));

  document.getElementById("totalOrders").innerText=yeniList.length+odemeList.length+kargoList.length;
  document.getElementById("count-yeni").innerText=yeniList.length;
  document.getElementById("count-odeme").innerText=odemeList.length;
  document.getElementById("count-kargo").innerText=kargoList.length;
  document.getElementById("count-iptal").innerText=iptalList.length;
  document.getElementById("count-arsiv").innerText=arsivList.length;

  const empty="<p style='color:#666;padding:10px;font-size:12px;'>Kayıt bulunamadı.</p>";

  document.getElementById("body-yeni").innerHTML=applySearch(yeniList).length?applySearch(yeniList).map(({o,i})=>buildCard(o,i)).join(""):empty;
  document.getElementById("body-odeme").innerHTML=applySearch(odemeList).length?applySearch(odemeList).map(({o,i})=>buildCard(o,i)).join(""):empty;
  document.getElementById("body-kargo").innerHTML=applySearch(kargoList).length?applySearch(kargoList).map(({o,i})=>buildCard(o,i)).join(""):empty;

  document.getElementById("body-iptal").innerHTML=applySearch(iptalList).length
    ?applySearch(iptalList).map(({o})=>`<div class="arsivRow"><div><b>👤 ${o.customer?.isim}</b><div class="detail">📅 ${o.iptalTarihi||'İptal'}</div></div><div class="tutar" style="color:#d63031">${calcTotal(o)}₺</div></div>`).join("")
    :empty;
  document.getElementById("body-arsiv").innerHTML=applySearch(arsivList).length
    ?applySearch(arsivList).map(({o})=>`<div class="arsivRow"><div><b>👤 ${o.customer?.isim}</b><div class="detail">📅 ${o.arsivTarihi||'Arşiv'}</div></div><div class="tutar">${calcTotal(o)}₺</div></div>`).join("")
    :empty;
}
</script>
</body>
</html>
